<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>Gestão de Convidados | Event Master</h1>
        <!-- coloquei os emoji pra mudar as cores do tema -->
        <div class="theme-switch-wrapper">
            <label class="theme-switch" for="checkbox-theme">
                <input type="checkbox" id="checkbox-theme" />
                <div class="slider">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                    <div class="ball"></div>
                </div>
            </label> 
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Cadastro de Convidado</h2>
            <form id="form-credenciamento">
                <div class="input-group">
                    <label for="nome">Nome Completo: </label>
                    <input type="text" id="nome" placeholder="Digite o nome completo">
                </div>

                <div class="input-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" placeholder="exemplo@email.com">
                </div>

                <div class="input-group">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00">
                </div>

                <div class="input-group">
                    <label for="empresa">Empresa/Instituição:</label>
                    <input type="text" id="empresa" placeholder="Nome da empresa">
                </div>

                <div class="input-group">
                    <label for="cargo">Cargo:</label>
                    <input type="text" id="cargo" placeholder="Ex: Diretor, Gerente...">
                </div>

                <p id="mensagem-erro" class="error-msg"></p>
                
                <button type="submit" class="btn-submit">Confirmar Presença</button>
                <!-- coloquei esse pequeno aviso pra lembrar de limpar o formulário-->
                <small class="tip">Pressione <strong>ESC</strong> para limpar o formulário.</small>
            </form>
        </section>

        <section class="list-section">
            <h2>Lista de Convidados</h2>
            <div id="lista-convidados" class="cards-container">
                <p id="lista-vazia" class="empty-msg">Nenhum convidado adicionado ao evento.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
